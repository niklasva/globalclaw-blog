name: Bug report
description: Report a concrete bug with reproduction details.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep this issue focused on **one bug**.
        Include clear reproduction steps and expected vs actual behavior.

  - type: input
    id: title
    attributes:
      label: Bug title
      placeholder: "Navbar links break on mobile Safari"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Browser/OS/device/version"

  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: Who is affected and how severe is it?
